<!DOCTYPE html>
 <html lang="en">
<head>
 <meta charset="UTF-8">
 <title>Connect 4</title>
 <style>
* { box-sizing: border-box; margin: 0; padding: 0; }
 body {
 font-family: 'Courier New', monospace;
 background: #111;
 color: #eee;
 display: flex;
 align-items: center;
 justify-content: center;
 min-height: 100dvh;
 padding: 16px; 
}

pre {
 white-space: pre;
 line-height: 1;
 font-size: 84px;
}

.p1 { color: #00d4d4 } /* X is cyan */
.p2 { color: #ef4c00 } /* O is orange */
.win { animation: w 0.4s step-end infinite } /* winning pieces flash */ 
@keyframes w { 0%,100%{opacity:1} 50%{opacity:0.1} }
 </style>
</head>
<body>
 <pre id="game"></pre>

  <script>
var ROWS = 6, COLS = 7, EMPTY = 0, P1 = 1, P2 = 2;
var moves = '', over = false;
function getBoard() {
      var b = [];
      for (var r = 0; r < ROWS; r++) {
            b[r] = [];
            for (var c = 0; c < COLS; c++) b[r][c] = EMPTY;
      }
      for (var i = 0; i < moves.length; i++) {
           var col = parseInt(moves.charAt(i), 10);
           var player = (i % 2 === 0) ? P1 : P2;
           for (var r = ROWS - 1; r >= 0; r--) {
                 if (b[r][col] === EMPTY) { b[r][col] = player; break; }
                 }
           }
      return b;
}

function getWinner(b, player) {
     
      var r, c, i, win;

      for (r =  0; r < ROWS; r++) {
            for (c = 0; c <= COLS - 4; c++) {
                  win = [[r,c],[r,c+1],[r,c+2],[r,c+3]];
                  for (i = 0; i < 4; i++) if (b[win[i][0]][win[i][1]] !== player)
                  { win =null; break; }
                  if (win) return win;
            }
      }
      
      for (r = 0; r <= ROWS - 4; r++){         
            for (c = 0; c < COLS; c++) {
                  win = [[r,c],[r+1,c],[r+2,c],[r+3,c]];
                  for (i = 0; i < 4; i++) if (b[win[i][0]][win[i][1]] !==player)
                  { win = null; break; }
                  if (win) return win;
            }
      }
   
      for (r = 0; r <= ROWS - 4; r++) {
            for (c = 0; c < COLS-4; c++) {
                  win = [[r,c],[r+1,c+1],[r+2,c+2],[r+3,c+3]];
                  for (i = 0; i < 4; i++) if (b[win[i][0]][win[i][1]] !== player)
                  { win = null; break; }
                  if (win) return win;
            }
      }
       
      for (r = 3; r < ROWS; r++) {
            for (c = 0; c <= COLS - 4; c++) {
                  win = [[r,c],[r-1,c+1],[r-2,c+2],[r-3,c+3]];
                  for (i = 0; i < 4; i++) if (b[win[i][0]][win[i][1]] !== player)
                  { win = null; break; }
                  if (win) return win;
            }
     }
     return null;
}

function isFull(b) {
for (var c = 0; c < COLS; c++) if (b[0][c] ===EMPTY) return false;
return true;
}

function play(c) {
if (over) return; 
var b = getBoard();
if (b[0][c] !== EMPTY) return;
moves += c;
render();
}

function newGame() {
moves = ''; over = false;
render();
}

function render() {
      var b = getBoard();
      var turn = (moves.length % 2 === 0) ? P1 : P2;
      var last = (moves.length > 0) ? ((moves.length % 2 === 0) ? P2 : P1) : null;
      var win = (last !==null) ? getWinner(b, last) : null;
      var draw = (!win && isFull(b));
      over = (win !== null || draw);
      var winSet = {};
      if (win) {
            for (var i = 0; i < win.length; i++) {
                 winSet[win[i][0] + ',' + win[i][1] ]= true;
                 }
            }
      var html = '';
      var cls, sym;
        
      cls = (turn === P1) ? 'p1' : 'p2';
      for (var c =0; c < COLS; c++) {
            html += '<span class="' + cls + '">' + c + '</span>'; 
      } 

      for (var r = 0; r < ROWS; r++) {
            html += '\n';
            for (var c = 0; c < COLS; c++) {
            var key = r + ',' + c;
            var v = b[r][c];
            if (v === P1) html +=      '<span class="p1' + (winSet[key] ? ' win' : '') + '">X</span>';
            else if (v === P2) html += '<span class="p2' + (winSet[key] ? ' win' : '') + '">0</span>';   
            else html += '.';    
            }
      }

      html += '\n';
      if (win) {
            cls = (last === P1) ? 'p1' : 'p2';
            sym = (last === P1) ? 'X' : '0';
            html += '<span class="' + cls + '">' + sym + ' wins!</span>'; 
      } else if (draw) {
            html += "Draw ";
      } else {
            cls = (turn === P1) ? 'p1' : 'p2';
            sym = (turn === P1) ? 'X' : 'O';
            html += '<span class="' + cls + '">' + sym + 's turn</span>';
      } 
      document.getElementById('game').innerHTML = html;
}

document.onkeydown = function(e) {
     if (e.key === 'Enter') { newGame(); return; }
     if (over) return;
     var n = parseInt(e.key, 10);
     if (n >= 0 && n <= 6) play(n);
};

document.getElementById('game').onclick = function(e) {
     if (over) {newGame (); return; }
     var t = e.target; 
     if (t.tagName !== 'SPAN') return;
     var col =parseInt(t.innerHTML, 10);
     if (col >=  0 && col <=  6) play(col); 
};

newGame();
</script>

</body>
</html>.
