<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CONNECT 4</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; width: 100%; overflow: hidden; }
body {
  font-family: 'Courier New', Courier, monospace;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 8px;
  background: #111;
  color: #eee;
  min-height: 100dvh;
}
#board-display {
  white-space: pre;
  line-height: 0.8;
  text-align: center;
  display: block;
}
/* #status is rendered as the 8th line inside #board-display */
#new-game-btn {
  font-size: clamp(12px, 2.5vw, 18px);
  padding: 8px 20px;
  display: none;
}
.p1 { color:#00d4d4 }
.p2 { color:#ef4c00 }
.hdr { cursor:pointer }
.hdr:hover { opacity:0.6 }
.cw { animation:w 0.45s step-end infinite }
@keyframes w { 0%,100%{opacity:1} 50%{opacity:0.1} }
</style>
</head>
<body>
<pre id="board-display"></pre>
<button id="new-game-btn" onclick="newGame()">Play again (n)</button>
<script>
const ROWS = 6, COLS = 7, EMPTY = 0, P1 = 1, P2 = 2;
let moveStr = '', gameOver = false;

function createBoard() {
  return Array.from({ length: ROWS }, () => Array(COLS).fill(EMPTY));
}

function replayMoves(moveStr) {
  const board = createBoard();
  for (let i = 0; i < moveStr.length; i++) {
    const col = parseInt(moveStr[i], 10);
    const player = i % 2 === 0 ? P1 : P2;
    for (let row = ROWS - 1; row >= 0; row--) {
      if (board[row][col] === EMPTY) { board[row][col] = player; break; }
    }
  }
  return board;
}

function checkWin(board, player) {
  for (let row = 0; row < ROWS; row++)
    for (let col = 0; col <= COLS - 4; col++)
      if ([0,1,2,3].every(i => board[row][col+i] === player))
        return [[row,col],[row,col+1],[row,col+2],[row,col+3]];
  for (let row = 0; row <= ROWS - 4; row++)
    for (let col = 0; col < COLS; col++)
      if ([0,1,2,3].every(i => board[row+i][col] === player))
        return [[row,col],[row+1,col],[row+2,col],[row+3,col]];
  for (let row = 0; row <= ROWS - 4; row++)
    for (let col = 0; col <= COLS - 4; col++)
      if ([0,1,2,3].every(i => board[row+i][col+i] === player))
        return [[row,col],[row+1,col+1],[row+2,col+2],[row+3,col+3]];
  for (let row = 3; row < ROWS; row++)
    for (let col = 0; col <= COLS - 4; col++)
      if ([0,1,2,3].every(i => board[row-i][col+i] === player))
        return [[row,col],[row-1,col+1],[row-2,col+2],[row-3,col+3]];
  return null;
}

function isFull(board)    { return board[0].every(c => c !== EMPTY); }
function colFull(b, col) { return b[0][col] !== EMPTY; }

function renderBoard(board, winCells, turn, status) {
  const winSet = new Set((winCells ?? []).map(([r, c]) => `${r},${c}`));
  const pClass = turn === P1 ? 'p1' : 'p2';
  const header = Array.from({ length: COLS }, (_, i) =>
    `<span class="hdr" onmouseenter="this.classList.add('${pClass}')" onmouseleave="this.classList.remove('${pClass}')" onclick="playColumn(${i})">${i}</span>`
  ).join('');
  const lines = [];
  for (let row = 0; row < ROWS; row++) {
    let line = '';
    for (let col = 0; col < COLS; col++) {
      const k = `${row},${col}`, v = board[row][col];
      if (winSet.has(k))      line += `<span class="cw ${v===P1?'p1':'p2'}">${v===P1?'X':'0'}</span>`;
      else if (v === P1)      line += `<span class="p1">X</span>`;
      else if (v === P2)      line += `<span class="p2">0</span>`;
      else                    line += `<span>.</span>`;
    }
    lines.push(line);
  }
  document.getElementById('board-display').innerHTML =
    header + '\n' + lines.join('\n') + '\n' + status;
}

function newGame() {
  moveStr = ''; gameOver = false;
  document.getElementById('new-game-btn').style.display = 'none';
  renderGameState();
}

function playColumn(col) {
  if (gameOver) return;
  const board = replayMoves(moveStr);
  if (colFull(board, col) || moveStr.length >= 42) return;
  moveStr += col;
  renderGameState();
}

function renderGameState() {
  const board = replayMoves(moveStr);
  const turn  = moveStr.length % 2 === 0 ? P1 : P2;
  const last  = moveStr.length > 0 ? (moveStr.length % 2 === 0 ? P2 : P1) : null;
  const win   = last ? checkWin(board, last) : null;
  const draw  = !win && isFull(board);
  gameOver = !!(win || draw);

  const sym  = p => p === P1 ? 'X' : '0';
  const sCls = p => p === P1 ? 'p1' : 'p2';
  let status, statusText;
  if (win) {
    const c = sCls(last);
    status     = `<span class="${c}">P${last} ${sym(last)} wins!</span>`;
    statusText = `P${last} ${sym(last)} wins!`;
    document.getElementById('new-game-btn').style.display = 'block';
  } else if (draw) {
    status     = "It's a draw.";
    statusText = status;
    document.getElementById('new-game-btn').style.display = 'block';
  } else {
    const c = sCls(turn);
    status     = `<span class="${c}">P${turn} ${sym(turn)}</span>`;
    statusText = `P${turn} ${sym(turn)}`;
  }

  const padL    = Math.floor((COLS - statusText.length) / 2);
  const statusLine = ' '.repeat(Math.max(0, padL)) + status;

  sizeBoard();
  renderBoard(board, win, turn, statusLine);
}

document.addEventListener('keydown', e => {
  const n = parseInt(e.key, 10);
  if (n >= 0 && n <= 6)       playColumn(n);
  else if ((e.key === 'n' || e.key === 'N') && gameOver) newGame();
});

function sizeBoard() {
  const COLS = 7, ROWS_V = 8; // 8 text rows (1 header + 6 board + 1 status)
  const pad  = 16;
  const availW = (window.innerWidth  || 300) - pad;
  const availH = (window.innerHeight || 500) - pad;

  const mir = document.getElementById('_sz') || Object.assign(
    document.createElement('span'),
    { id:'_sz', style:'position:absolute;visibility:hidden;white-space:pre;pointer-events:none;display:block' }
  );
  const fam = getComputedStyle(document.getElementById('board-display')).fontFamily;
  mir.style.fontFamily = fam;
  document.body.appendChild(mir);

  // Measure at browser default font size (~16px).
  // charW0: width of one monospace character at default size.
  // totalH0: total height of 7 text rows at default size.
  mir.textContent = '0';
  const charW0 = mir.getBoundingClientRect().width;

  mir.textContent = Array(ROWS_V + 1).join('0\n');
  const totalH0 = mir.getBoundingClientRect().height;
  document.body.removeChild(mir);

  // Both dimensions scale linearly with fontSize, so we can derive the
  // max font that fits each axis from the default measurements:
  //   charW(em)  = charW0  * em / 16  → emByW = 16 * availW / (COLS * charW0)
  //   totalH(em) = totalH0 * em / 16  → emByH = 16 * availH / totalH0
  const emByW = Math.floor(16 * availW / (COLS * charW0));
  const emByH = Math.floor(16 * availH / totalH0);

  document.getElementById('board-display').style.fontSize = Math.min(emByW, emByH) + 'px';
}

window.addEventListener('resize', sizeBoard);
window.addEventListener('load', () => { sizeBoard(); renderGameState(); });
</script>
</body>
</html>
